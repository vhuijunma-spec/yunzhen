<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — 云帧</title>
    <style>
        :root {
            --bg:#0a0a0f;--card:#181820;--border:#25252d;--text:#e8e8ed;
            --text2:#9898a8;--accent:#6366f1;--accent2:#818cf8;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .reg-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px 40px; width: 460px; max-width: 90vw;
        }
        .reg-box h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
        .reg-box .sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
        .form-group label .required { color: var(--red); margin-left: 2px; }
        .form-group label .optional { color: var(--text2); font-weight: 400; opacity: 0.6; margin-left: 4px; }
        .form-group input {
            width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px; outline: none; transition: .2s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input.error { border-color: var(--red); }
        .field-error { color: var(--red); font-size: 12px; margin-top: 4px; display: none; }
        .btn {
            width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: .2s; margin-top: 8px;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent2); }
        .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }
        .msg { font-size: 13px; margin-top: 6px; display: none; padding: 10px 14px; border-radius: 6px; }
        .msg.error { color: var(--red); background: rgba(239,68,68,0.08); display: block; }
        .msg.success { color: var(--green); background: rgba(34,197,94,0.08); display: block; }
        .links { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text2); }
        .links a { color: var(--accent2); text-decoration: none; }
        .hint { font-size: 12px; color: var(--text2); margin-top: 4px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="reg-box">
    <h1>创建账号</h1>
    <p class="sub">注册 云帧 · 等待销售员审核</p>
    <form id="reg-form" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label>用户名 <span class="required">*</span></label>
            <input type="text" id="username" placeholder="至少 3 个字符" required minlength="3" autofocus>
            <div class="field-error" id="err-username"></div>
        </div>
        <div class="form-group">
            <label>邮箱 <span class="required">*</span></label>
            <input type="email" id="email" placeholder="your@email.com" required>
            <div class="field-error" id="err-email"></div>
        </div>
        <div class="form-group">
            <label>手机号码 <span class="required">*</span></label>
            <input type="tel" id="phone" placeholder="11位中国大陆手机号，如 13812345678" required maxlength="11">
            <div class="field-error" id="err-phone"></div>
        </div>
        <div class="form-group">
            <label>密码 <span class="required">*</span></label>
            <input type="password" id="password" placeholder="至少 6 个字符" required minlength="6">
            <div class="hint">至少 6 位，建议包含字母和数字</div>
        </div>
        <div class="form-group">
            <label>销售员码 <span class="optional">（选填）</span></label>
            <input type="text" id="sales-code" placeholder="如有销售员码请填写，6位字母数字" maxlength="6">
            <div class="hint">例如：abc123。不填则系统自动分配。</div>
        </div>
        <div class="msg" id="msg"></div>
        <button type="submit" class="btn btn-accent" id="btn-submit">注 册</button>
    </form>
    <p class="links">已有账号？<a href="/login">去登录</a> &nbsp;|&nbsp; <a href="/">返回首页</a></p>
</div>

<script>
// 手机号校验（中国大陆）
function isValidPhone(p) {
    return /^1[3-9]\d{9}$/.test(p);
}
// 邮箱校验
function isValidEmail(e) {
    return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e);
}

// 实时校验
document.getElementById('phone').addEventListener('input', function() {
    const v = this.value.trim();
    const errEl = document.getElementById('err-phone');
    if (v && !isValidPhone(v)) {
        this.classList.add('error');
        errEl.textContent = '请输入正确的11位手机号';
        errEl.style.display = 'block';
    } else {
        this.classList.remove('error');
        errEl.style.display = 'none';
    }
});

document.getElementById('email').addEventListener('input', function() {
    const v = this.value.trim();
    const errEl = document.getElementById('err-email');
    if (v && !isValidEmail(v)) {
        this.classList.add('error');
        errEl.textContent = '请输入正确的邮箱地址';
        errEl.style.display = 'block';
    } else {
        this.classList.remove('error');
        errEl.style.display = 'none';
    }
});

async function handleRegister(e) {
    e.preventDefault();
    const username   = document.getElementById('username').value.trim();
    const email      = document.getElementById('email').value.trim();
    const phone      = document.getElementById('phone').value.trim();
    const password   = document.getElementById('password').value.trim();
    const sales_code = document.getElementById('sales-code').value.trim().toLowerCase();
    const msgEl = document.getElementById('msg');
    const btn   = document.getElementById('btn-submit');

    // 前端预校验
    let hasError = false;
    document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');
    document.querySelectorAll('input.error').forEach(el => el.classList.remove('error'));

    if (username.length < 3) {
        document.getElementById('err-username').textContent = '用户名至少3个字符';
        document.getElementById('err-username').style.display = 'block';
        document.getElementById('username').classList.add('error');
        hasError = true;
    }
    if (!isValidEmail(email)) {
        document.getElementById('err-email').textContent = '请输入正确的邮箱地址';
        document.getElementById('err-email').style.display = 'block';
        document.getElementById('email').classList.add('error');
        hasError = true;
    }
    if (!isValidPhone(phone)) {
        document.getElementById('err-phone').textContent = '请输入正确的11位手机号';
        document.getElementById('err-phone').style.display = 'block';
        document.getElementById('phone').classList.add('error');
        hasError = true;
    }
    if (password.length < 6) { toast('密码至少6个字符'); hasError = true; }
    if (sales_code && !/^[a-z0-9]{6}$/.test(sales_code)) { toast('销售员码格式不正确（6位字母数字）'); hasError = true; }
    if (hasError) return;

    msgEl.className = 'msg'; msgEl.style.display = 'none';
    btn.disabled = true; btn.textContent = '注册中...';

    try {
        const r = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, email, phone, password, sales_code}),
        });
        const d = await r.json();
        if (d.code === 0) {
            msgEl.textContent = d.message;
            msgEl.className = 'msg success';
            btn.textContent = '已提交';
        } else {
            msgEl.textContent = d.message || '注册失败';
            msgEl.className = 'msg error';
            btn.disabled = false; btn.textContent = '注 册';
        }
    } catch(ex) {
        msgEl.textContent = '网络错误，请重试';
        msgEl.className = 'msg error';
        btn.disabled = false; btn.textContent = '注 册';
    }
}
</script>
</body>
</html>
