<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 云帧</title>
    <style>
        :root {
            --bg:#0a0a0f;--card:#181820;--border:#25252d;--text:#e8e8ed;
            --text2:#9898a8;--text3:#5c5c6e;--accent:#6366f1;--accent2:#818cf8;--red:#ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 48px 40px; width: 420px; max-width: 90vw;
        }
        .login-box h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
        .login-box .sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px; outline: none; transition: .2s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .btn {
            width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: .2s; margin-top: 8px;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent2); }
        .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }
        .error-msg { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }
        .links { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text2); }
        .links a { color: var(--accent2); text-decoration: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>欢迎回来</h1>
    <p class="sub">登录 云帧</p>
    <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <button type="submit" class="btn btn-accent" id="btn-submit">登 录</button>
    </form>
    <p class="links">还没有账号？<a href="/register">立即注册</a> &nbsp;|&nbsp; <a href="/">返回首页</a></p>
</div>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = '登录中...';

    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password}),
        });
        const d = await r.json();
        if (d.code === 0) {
            // 根据角色跳转
            if (d.user.role === 'admin') {
                location.href = '/admin';
            } else if (d.user.role === 'salesperson') {
                location.href = '/sales';
            } else {
                location.href = '/dashboard';
            }
        } else {
            errEl.textContent = d.message || '登录失败';
            errEl.style.display = 'block';
        }
    } catch(ex) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = '登 录';
}
</script>
</body>
</html>
